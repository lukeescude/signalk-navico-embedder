name: Publish to npm

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk -v ver="# ${GITHUB_REF_NAME}" '
            index($0, ver) == 1 && ($0 == ver || substr($0, length(ver) + 1, 2) == " (") { found = 1; next }
            found && /^# v/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for heading '# ${GITHUB_REF_NAME}'"
            exit 1
          fi
          echo "----- release notes for ${GITHUB_REF_NAME} -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    permissions:
      id-token: write # OIDC trusted publishing
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish to npm
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          if [[ "$tag" == *alpha* ]]; then
            npm publish --provenance --access public --tag alpha
          elif [[ "$tag" == *beta* ]]; then
            npm publish --provenance --access public --tag beta
          elif [[ "$tag" == *rc* ]]; then
            npm publish --provenance --access public --tag rc
          else
            npm publish --provenance --access public
          fi
